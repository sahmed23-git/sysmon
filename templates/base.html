<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SysMon — {% block title %}Dashboard{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
  <nav class="sidebar">
    <div class="sidebar-brand">
      <span class="brand-icon"></span>
      <span class="brand-name">SysMon</span>
    </div>
    <a href="/" class="nav-item {% block nav_home %}{% endblock %}">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Overview
    </a>
    <a href="/alerts" class="nav-item {% block nav_alerts %}{% endblock %}">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      Alerts
    </a>
    <a href="/settings" class="nav-item {% block nav_settings %}{% endblock %}">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Settings
    </a>
    <div class="sidebar-footer">
      <span class="status-dot" id="global-status"></span>
      <span class="status-text" id="global-status-text">Loading...</span>
    </div>
  </nav>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <script>
    // Keep offline check running every 30s
    setInterval(() => {
      fetch('/api/check-offline', { method: 'POST' }).catch(() => {});
    }, 30000);
    fetch('/api/check-offline', { method: 'POST' }).catch(() => {});

    // Update global status
    async function updateGlobalStatus() {
      try {
        const devices = await fetch('/api/devices').then(r => r.json());
        const online = devices.filter(d => d.status === 'online').length;
        const critical = devices.filter(d => d.active_alerts > 0).length;
        const dot = document.getElementById('global-status');
        const txt = document.getElementById('global-status-text');
        if (critical > 0) {
          dot.className = 'status-dot critical'; txt.textContent = `${critical} alert${critical>1?'s':''}`;
        } else if (online > 0) {
          dot.className = 'status-dot online'; txt.textContent = `${online} online`;
        } else {
          dot.className = 'status-dot offline'; txt.textContent = 'No devices';
        }
      } catch(e) {}
    }
    updateGlobalStatus();
    setInterval(updateGlobalStatus, 15000);
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
